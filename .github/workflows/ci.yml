name: CI Pipeline

on:
  push:
    branches:
      - main
      - dev
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Run Lint (Code Quality)
        run: flake8 . --exclude=venv

      - name: Run Tests
        run: pytest

      - name: Build Artifact
        run: |
          zip -r app.zip .

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: flask-app
          path: app.zip
